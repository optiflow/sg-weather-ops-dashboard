pre-commit:
  parallel: false
  commands:
    lint:
      run: npm run lint
    test:
      run: npm test

pre-push:
  parallel: false
  commands:
    build:
      run: npm run build
    docs-build:
      run: npm run docs:build
    docs-check:
      run: npm run docs:check
    e2e:
      run: npm run test:e2e
